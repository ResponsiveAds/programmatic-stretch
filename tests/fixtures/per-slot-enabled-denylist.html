<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Per-slot enabled — denylist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f8f9fa; }
    .content { max-width: 800px; margin: 24px auto; padding: 0 24px; }
    .ad-wrap { margin: 24px 0; background: #fff; border: 1px solid #ddd; padding: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="content">

    <!-- This slot has NO per-slot config — global enabled:true applies, so it stretches -->
    <div class="ad-wrap">
      <div id="ad-slot-allowed">
        <iframe
          id="ad-iframe-allowed"
          width="300"
          height="250"
          style="border:none;display:block;margin:0 auto;"
          srcdoc="
            <html><body style='margin:0;background:#a8e6cf;'>
              <script>
                window.addEventListener('load', function() {
                  window.top.postMessage(JSON.stringify({
                    message: 'Prebid Creative',
                    adId: 'ad-slot-allowed',
                    action: 'programmaticStretch',
                    height: 250
                  }), '*');
                });
              </script>
            </body></html>
          "
        ></iframe>
      </div>
    </div>

    <!-- This slot has enabled:false — should be skipped even though global is enabled -->
    <div class="ad-wrap">
      <div id="ad-slot-denied">
        <iframe
          id="ad-iframe-denied"
          width="300"
          height="250"
          style="border:none;display:block;margin:0 auto;"
          srcdoc="
            <html><body style='margin:0;background:#fd79a8;'>
              <script>
                window.addEventListener('load', function() {
                  window.top.postMessage(JSON.stringify({
                    message: 'Prebid Creative',
                    adId: 'ad-slot-denied',
                    action: 'programmaticStretch',
                    height: 250
                  }), '*');
                });
              </script>
            </body></html>
          "
        ></iframe>
      </div>
    </div>

  </div>

  <script>
    window.programmaticStretch = {
      enabled: true,
      slots: {
        'ad-slot-denied': { enabled: false }
      }
    };
  </script>
  <script src="../../programmaticStretch.js"></script>
</body>
</html>
